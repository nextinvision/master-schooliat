<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{COMPANY_NAME}} Letterhead</title>
    <style>
        :root {
            --primary: {
                    {
                    THEME_COLOR
                }
            }

            ;

            --secondary: {
                    {
                    THEME_COLOR_DARK
                }
            }

            ;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --bg-light: #f8fafc;
        }

        @media print {
            @page {
                margin: 0;
                size: letter;
            }

            body {
                margin: 0;
                padding: 0;
                height: 11in;
                display: flex;
                flex-direction: column;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: var(--text-dark);
            background: #fff;
            min-height: 11in;
            display: flex;
            flex-direction: column;
        }

        /* Modern Header */
        .header {
            position: relative;
            padding: 40px 50px 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 4px solid var(--primary);
            background: linear-gradient(to right, #ffffff, var(--bg-light));
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 24px;
            max-width: 60%;
        }

        .logo {
            max-height: 80px;
            max-width: 140px;
            object-fit: contain;
        }

        .company-info h1 {
            font-size: 17pt;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            line-height: 1.1;
            max-width: 100%;
            word-wrap: break-word;
        }

        .company-info p {
            font-size: 12pt;
            font-weight: 500;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-section {
            text-align: right;
            font-size: 9.5pt;
            color: var(--text-dark);
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            max-width: 350px;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 6px;
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .contact-icon {
            width: 14px;
            height: 14px;
            color: var(--primary);
            margin-top: 2px;
            flex-shrink: 0;
        }

        /* Content Area */
        .main-content {
            flex: 1;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
        }

        .meta-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .date-text {
            text-align: right;
            color: var(--text-gray);
            font-size: 11pt;
            font-weight: 600;
        }

        .subject-box {
            background: var(--bg-light);
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 0 6px 6px 0;
        }

        .subject-box strong {
            color: var(--primary);
            text-transform: uppercase;
            font-size: 10pt;
            letter-spacing: 0.5px;
            margin-right: 8px;
        }

        .letter-body {
            font-size: 11.5pt;
            color: #334155;
            white-space: pre-wrap;
            text-align: justify;
            flex: 1;
        }

        .letter-body p {
            margin-bottom: 1em;
        }

        /* Signature */
        .signature-wrapper {
            margin-top: 60px;
            page-break-inside: avoid;
        }

        .signature-line {
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, var(--primary), transparent);
            margin-bottom: 12px;
        }

        .signature-name {
            font-weight: 700;
            font-size: 12pt;
            color: var(--text-dark);
        }

        .signature-title {
            font-size: 10pt;
            color: var(--text-gray);
            font-style: italic;
        }

        /* Modern Footer */
        .footer {
            margin-top: auto;
            border-top: 1px solid #e2e8f0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-light);
            position: relative;
        }

        .footer::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
        }

        .footer-left {
            font-size: 9pt;
            color: var(--text-gray);
            font-weight: 500;
        }

        .footer-right {
            font-size: 9pt;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="brand-section">
            {{LOGO_HTML}}
            <div class="company-info">
                <h1>{{COMPANY_NAME}}</h1>
                {{COMPANY_TAGLINE}}
            </div>
        </div>

        <div class="contact-section">
            <div class="contact-item">
                <span style="text-align: right">{{COMPANY_ADDRESS}}</span>
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
            </div>
            <div class="contact-item">
                <span>{{COMPANY_PHONE}}</span>
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                </svg>
            </div>
            <div class="contact-item">
                <span>{{COMPANY_EMAIL}}</span>
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="meta-header">
            <div class="date-text">{{DATE}}</div>
            {{SUBJECT_SECTION}}
        </div>

        <div class="letter-body">{{CONTENT}}</div>

        {{SIGNATURE_SECTION}}
    </main>

    <footer class="footer">
        <div class="footer-left">
            Official System Generated Document
        </div>
        <div class="footer-right">
            {{COMPANY_NAME}}
        </div>
    </footer>
</body>

</html>
